                var src = imgTd.getAttribute('src');

                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {

                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);

                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);

    layer_Prediosadquiridosconfinesambientales1_9,
    layer_Prediosadquiridosconfinesambientales2_8,

    layer_Prediosadquiridosconfinesambientales6_4,
    layer_Prediosadquiridosconfinesambientales7_3
];

var selector = document.getElementById("buscarPredio");

capasPredios.forEach(function(capa){

    capa.eachLayer(function(l){

        var pk = l.feature.properties.PK_PREDIOS;

        if(pk){

            var opcion = document.createElement("option");
            opcion.value = pk;
            opcion.text = pk;

            selector.appendChild(opcion);

        }

    });

});

var resaltado = null;

selector.addEventListener("change",function(){

    var pk = this.value;

    if(resaltado){
        map.removeLayer(resaltado);
    }

    capasPredios.forEach(function(capa){

        capa.eachLayer(function(l){

            if(l.feature.properties.PK_PREDIOS==pk){

                map.fitBounds(l.getBounds());

                resaltado=L.geoJSON(l.toGeoJSON(),{

                    style:{
                        color:"#ffff00",
                        weight:5,
                        fillOpacity:0.15
                    }

                }).addTo(map);

            }

        });

    });

});

    L.circleMarker(e.latlng,{
        radius:8,
        color:"blue",
        fillColor:"#00BFFF",
        fillOpacity:1
    }).addTo(map);

});

});
